*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

:root{

--bg:#0f172a;
--card:#1e293b;
--card2:#273449;
--text:#f8fafc;
--primary:#526683;
--hover:#657892;
--border:#334155;

}

body{

font-family:'Poppins',sans-serif;
background:var(--bg);
color:var(--text);

}

a{

text-decoration:none;
color:white;

}

.container{

width:90%;
max-width:1200px;
margin:auto;

}

section{

padding:80px 0;

}

h2{

font-size:32px;
margin-bottom:30px;
position:relative;

}

h2::after{

content:"";
position:absolute;
left:0;
bottom:-8px;
width:70px;
height:4px;
background:var(--primary);
border-radius:10px;

}

.hero{

min-height:100vh;

background:

linear-gradient(rgba(15,23,42,.82),rgba(15,23,42,.88)),
url("profile.jpg");

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;
text-align:center;

padding:40px;

}

.hero img{

width:180px;
height:180px;

border-radius:50%;

border:5px solid white;

object-fit:cover;

box-shadow:0 0 35px rgba(0,0,0,.4);

}

.hero h1{

margin-top:25px;

font-size:50px;

font-weight:700;

}

.hero p{

margin-top:12px;

font-size:22px;

color:#d1d5db;

}

.hero-buttons{

margin-top:35px;

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

}

.btn{

padding:14px 28px;

background:var(--primary);

border-radius:12px;

font-weight:600;

transition:.35s;

display:inline-block;

}

.btn:hover{

background:var(--hover);

transform:translateY(-3px);

}

.btn-outline{

padding:14px 28px;

border:2px solid white;

border-radius:12px;

font-weight:600;

transition:.35s;

}

.btn-outline:hover{

background:white;

color:#111827;

}
<style>

/* NAV */
nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(15,23,42,.7);
backdrop-filter:blur(10px);
border-bottom:1px solid var(--border);
z-index:999;
}

nav h3{
color:white;
font-size:20px;
}

nav ul{
display:flex;
gap:25px;

/* SKILLS */
.skills-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
margin-top:40px;
}

.skill{
background:var(--card);
padding:14px;
border-radius:12px;
text-align:center;
transition:.3s;
border:1px solid var(--border);
}

.skill:hover{
transform:translateY(-5px);
background:var(--card2);
}

/* PROJECTS */
.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

.project{
background:var(--card);
border-radius:16px;
overflow:hidden;
border:1px solid var(--border);
transition:.3s;
}

.project:hover{
transform:translateY(-6px);
}

.project img{
width:100%;
height:200px;
object-fit:cover;
}

.project-content{
padding:18px;
}

.project-content p{

.tags{

}

.tag{
